name: CI — Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mspr
          POSTGRES_PASSWORD: mspr
          POSTGRES_DB: msprds
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: API/requirements.txt

      - name: Install API dependencies
        run: pip install -r API/requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://mspr:mspr@localhost:5432/msprds
        run: |
          cd API
          pytest -q
#       ── Tests (à activer quand les tests seront créés) ─────────
      - name: Run tests
        env:
          DATABASE_URL: postgresql://mspr:mspr@localhost:5432/msprds
        run: pytest API/tests/ -v --tb=short

      - name: Check API starts correctly
        env:
          DATABASE_URL: postgresql://mspr:mspr@localhost:5432/msprds
        run: |
          cd API
          timeout 10 uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/docs || exit 1
          echo "✅ API démarrée avec succès"

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install frontend dependencies
        run: pip install -r app/requirements.txt

      - name: Run frontend unit tests
        env:
          PYTHONPATH: .
        run: pytest -q app/tests

      - name: Check Python syntax
        run: python -m py_compile app/app.py

      - name: Verify frontend starts
        run: |
          timeout 10 streamlit run app/app.py --logger.level=error &
          sleep 5
          echo "✅ Frontend Streamlit démarrée avec succès"
