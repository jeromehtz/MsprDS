version: "3.9"

services:
  # ─── Base de données ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: msprds_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mspr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mspr}
      POSTGRES_DB: ${POSTGRES_DB:-msprds}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mspr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API FastAPI ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msprds_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mspr}:${POSTGRES_PASSWORD:-mspr}@db:5432/${POSTGRES_DB:-msprds}
    env_file:
      - API/.env
    ports:
      - "8000:8000"
    volumes:
      - ./API:/app  # hot reload en dev

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: msprds_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./tableauDeBord:/usr/share/nginx/html:ro

  # ─── Monitoring (à activer quand le monitoring sera prêt) ─────
